<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="sl-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#171614"/>
      <stop offset="50%" stop-color="#1a1b1e"/>
      <stop offset="100%" stop-color="#1e2128"/>
    </linearGradient>
    <linearGradient id="sl-shape" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grain" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.3" fill="white" fill-opacity="0.012"/>
      <circle cx="3" cy="3" r="0.3" fill="white" fill-opacity="0.008"/>
    </pattern>
    <!--
      Left ramp now starts at 0.07 instead of 0 — the line has
      a subtle presence right from "l". Intermediate stops bumped
      slightly so the ramp is smooth and continuous.
    -->
    <linearGradient id="sl-accent" gradientUnits="userSpaceOnUse"
                    x1="83" y1="0" x2="248" y2="0">
      <stop offset="0%" stop-color="#d4943c" stop-opacity="0.07"/>
      <stop offset="8%" stop-color="#d4943c" stop-opacity="0.15"/>
      <stop offset="20%" stop-color="#d4943c" stop-opacity="0.3"/>
      <stop offset="55%" stop-color="#d4943c" stop-opacity="0.3"/>
      <stop offset="82%" stop-color="#d4943c" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#d4943c" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="900" height="200" fill="url(#sl-bg)"/>
  <rect width="900" height="200" fill="url(#grain)"/>
  <polygon points="600,0 900,0 900,200 680,200" fill="url(#sl-shape)"/>
  <line x1="620" y1="0" x2="700" y2="200"
        stroke="white" stroke-opacity="0.06" stroke-width="0.5"/>
  <circle cx="660" cy="100" r="40" fill="#d4943c" fill-opacity="0.03"/>
  <circle cx="660" cy="100" r="3" fill="#d4943c" fill-opacity="0.15"/>

  <text x="80" y="90" text-anchor="start"
        font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="36" font-weight="300" fill="#e0e0e0" letter-spacing="-0.5">
    libgraphql-parser
  </text>

  <line x1="83" y1="100" x2="248" y2="100"
        stroke="url(#sl-accent)" stroke-width="1"
        stroke-linecap="round"/>

  <text x="80" y="128" text-anchor="start"
        font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="13" fill="#808890" letter-spacing="0.3">
    Error-resilient, zero-copy GraphQL parser
  </text>
  <!--
    Spec version line: Currently shows a single spec version.
    When multi-spec feature flags ship (Section 4.8 of plans.md),
    update to list supported specs with a dot separator, e.g.:
      Sep 2025 · Oct 2021
    or for three specs:
      Sep 2025 · Oct 2021 · Jun 2018
    Same font, position, and color — just swap the text content.
  -->
  <text x="80" y="152" text-anchor="start"
        font-family="'SF Mono', monospace"
        font-size="9.5" fill="#606870" letter-spacing="0.5">
    September 2025 Specification
  </text>

  <text x="872" y="190" text-anchor="end"
        font-family="'SF Mono', 'Cascadia Code', monospace"
        font-size="8" fill="#5d554d" letter-spacing="0.5">
    v0.0.1
  </text>
</svg>
