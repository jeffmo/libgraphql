<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f6f4"/>
      <stop offset="50%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#f6f7fa"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4943c" stop-opacity="0.07"/>
      <stop offset="10%" stop-color="#d4943c" stop-opacity="0.35"/>
      <stop offset="45%" stop-color="#d4943c" stop-opacity="0.35"/>
      <stop offset="70%" stop-color="#d4943c" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#d4943c" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="900" height="200" fill="url(#bg)"/>

  <text x="80" y="90" fill="#24292f" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="36" font-weight="300" letter-spacing="-0.5">libgraphql</text>
  <rect x="83" y="100" width="350" height="1.5" fill="url(#accent)" rx="0.75"/>
  <text x="80" y="128" fill="#57606a" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" letter-spacing="0.3">Comprehensive GraphQL engine for Rust</text>
  <text x="80" y="152" fill="#8b949e" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="9.5">September 2025 Specification</text>
  <text x="872" y="190" fill="#adb5bd" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="8" text-anchor="end">v0.0.1</text>

  <circle cx="660" cy="100" r="90" fill="url(#glow)"/>
  <g transform="translate(660, 100) scale(1.6)" opacity="0.30">
    <line x1="0" y1="-24" x2="0" y2="24" stroke="#d4943c" stroke-width="0.7" opacity="0.25"/>
    <line x1="20.8" y1="-12" x2="-20.8" y2="12" stroke="#d4943c" stroke-width="0.7" opacity="0.25"/>
    <line x1="20.8" y1="12" x2="-20.8" y2="-12" stroke="#d4943c" stroke-width="0.7" opacity="0.25"/>
    <polygon points="0,-24 20.8,-12 20.8,12 0,24 -20.8,12 -20.8,-12" fill="none" stroke="#d4943c" stroke-width="1.2" stroke-linejoin="round"/>
    <circle cx="0" cy="-24" r="1.8" fill="#d4943c"/>
    <circle cx="20.8" cy="-12" r="1.8" fill="#d4943c"/>
    <circle cx="20.8" cy="12" r="1.8" fill="#d4943c"/>
    <circle cx="0" cy="24" r="1.8" fill="#d4943c"/>
    <circle cx="-20.8" cy="12" r="1.8" fill="#d4943c"/>
    <circle cx="-20.8" cy="-12" r="1.8" fill="#d4943c"/>
  </g>
</svg>
