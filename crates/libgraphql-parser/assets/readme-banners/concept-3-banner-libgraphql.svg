<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#171614"/>
      <stop offset="50%" stop-color="#1a1b1e"/>
      <stop offset="100%" stop-color="#1e2128"/>
    </linearGradient>
    <!-- Grain texture -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.06"/>
      </feComponentTransfer>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
    <!-- Accent line gradient -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4943c" stop-opacity="0.07"/>
      <stop offset="20%" stop-color="#d4943c" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#d4943c" stop-opacity="0.3"/>
      <stop offset="85%" stop-color="#d4943c" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#d4943c" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)"/>
  <!-- Grain overlay -->
  <rect width="900" height="200" filter="url(#grain)" opacity="0.5"/>

  <!-- Text content -->
  <text x="80" y="90" fill="#e0e0e0" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="36" font-weight="300" letter-spacing="-0.5">libgraphql</text>
  <!-- Accent line -->
  <rect x="83" y="100" width="165" height="1.5" fill="url(#accent)" rx="0.75"/>
  <!-- Subtitle -->
  <text x="80" y="128" fill="#808890" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" letter-spacing="0.3">Comprehensive GraphQL engine for Rust</text>
  <!-- Spec reference -->
  <text x="80" y="152" fill="#606870" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="9.5">September 2025 Specification</text>
  <!-- Version -->
  <text x="872" y="190" fill="#5d554d" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="8" text-anchor="end">v0.0.1</text>

  <!-- Glyph: Heptagon with cross-edges, centered at ~(660, 100) -->
  <g transform="translate(660, 100) scale(1.6)" opacity="0.35">
    <!-- Interior cross-edges -->
    <line x1="0" y1="-24" x2="10.4" y2="21.6" stroke="#d4943c" stroke-width="0.7" opacity="0.25"/>
    <line x1="0" y1="-24" x2="-10.4" y2="21.6" stroke="#d4943c" stroke-width="0.7" opacity="0.25"/>
    <line x1="18.8" y1="-15" x2="-23.4" y2="5.3" stroke="#d4943c" stroke-width="0.7" opacity="0.22"/>
    <line x1="23.4" y1="5.3" x2="-18.8" y2="-15" stroke="#d4943c" stroke-width="0.7" opacity="0.22"/>
    <line x1="18.8" y1="-15" x2="-10.4" y2="21.6" stroke="#d4943c" stroke-width="0.7" opacity="0.18"/>
    <line x1="23.4" y1="5.3" x2="-23.4" y2="5.3" stroke="#d4943c" stroke-width="0.7" opacity="0.18"/>
    <!-- Outer heptagon -->
    <polygon points="0,-24 18.8,-15 23.4,5.3 10.4,21.6 -10.4,21.6 -23.4,5.3 -18.8,-15" fill="none" stroke="#d4943c" stroke-width="1.2" stroke-linejoin="round"/>
    <!-- Vertex dots -->
    <circle cx="0" cy="-24" r="1.8" fill="#d4943c"/>
    <circle cx="18.8" cy="-15" r="1.8" fill="#d4943c"/>
    <circle cx="23.4" cy="5.3" r="1.8" fill="#d4943c"/>
    <circle cx="10.4" cy="21.6" r="1.8" fill="#d4943c"/>
    <circle cx="-10.4" cy="21.6" r="1.8" fill="#d4943c"/>
    <circle cx="-23.4" cy="5.3" r="1.8" fill="#d4943c"/>
    <circle cx="-18.8" cy="-15" r="1.8" fill="#d4943c"/>
  </g>
</svg>
