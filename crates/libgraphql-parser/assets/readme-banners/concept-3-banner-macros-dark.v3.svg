<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#171614"/>
      <stop offset="50%" stop-color="#1a1b1e"/>
      <stop offset="100%" stop-color="#1e2128"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.06"/>
      </feComponentTransfer>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4943c" stop-opacity="0.07"/>
      <stop offset="10%" stop-color="#d4943c" stop-opacity="0.3"/>
      <stop offset="45%" stop-color="#d4943c" stop-opacity="0.3"/>
      <stop offset="70%" stop-color="#d4943c" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#d4943c" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="900" height="200" fill="url(#bg)"/>
  <rect width="900" height="200" filter="url(#grain)" opacity="0.5"/>

  <text x="80" y="90" fill="#e0e0e0" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="36" font-weight="300" letter-spacing="-0.5">libgraphql-macros</text>
  <rect x="83" y="100" width="350" height="1.5" fill="url(#accent)" rx="0.75"/>
  <text x="80" y="128" fill="#808890" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" letter-spacing="0.3">Compile-time GraphQL schema validation</text>
  <text x="80" y="152" fill="#606870" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="9.5">September 2025 Specification</text>
  <text x="872" y="190" fill="#5d554d" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="8" text-anchor="end">v0.0.1</text>

  <g transform="translate(660, 100) scale(1.6)" opacity="0.35">
    <polygon points="0,-24 24,0 0,24 -24,0" fill="none" stroke="#d4943c" stroke-width="1.2" stroke-linejoin="round"/>
    <polygon points="0,-11 11,0 0,11 -11,0" fill="none" stroke="#d4943c" stroke-width="0.8" stroke-linejoin="round" opacity="0.55"/>
    <circle cx="0" cy="-24" r="1.8" fill="#d4943c"/>
    <circle cx="24" cy="0" r="1.8" fill="#d4943c"/>
    <circle cx="0" cy="24" r="1.8" fill="#d4943c"/>
    <circle cx="-24" cy="0" r="1.8" fill="#d4943c"/>
    <circle cx="0" cy="-11" r="1.2" fill="#d4943c" opacity="0.55"/>
    <circle cx="11" cy="0" r="1.2" fill="#d4943c" opacity="0.55"/>
    <circle cx="0" cy="11" r="1.2" fill="#d4943c" opacity="0.55"/>
    <circle cx="-11" cy="0" r="1.2" fill="#d4943c" opacity="0.55"/>
  </g>
</svg>
