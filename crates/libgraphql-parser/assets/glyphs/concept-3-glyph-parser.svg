<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- libgraphql-parser: Triangle with one open vertex (top) - gap in edges -->
  <defs>
    <style>
      .edge { fill: none; stroke: #d4943c; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
      .vertex { fill: #d4943c; }
      .vertex-ghost { fill: #d4943c; opacity: 0.22; }
    </style>
  </defs>
  <!-- Bottom edge: V1 to V2 (fully connected) -->
  <line class="edge" x1="54.5" y1="48" x2="9.5" y2="48"/>
  <!-- Right edge: V1 toward V0, stops ~6px short of top vertex -->
  <line class="edge" x1="54.5" y1="48" x2="35" y2="13.5"/>
  <!-- Left edge: V2 toward V0, stops ~6px short of top vertex -->
  <line class="edge" x1="9.5" y1="48" x2="29" y2="13.5"/>
  <!-- Ghost vertex at top (faded to show "open/gap") -->
  <circle class="vertex-ghost" cx="32" cy="9" r="2"/>
  <!-- Solid vertex dots at bottom -->
  <circle class="vertex" cx="54.5" cy="48" r="2.3"/>
  <circle class="vertex" cx="9.5" cy="48" r="2.3"/>
</svg>
