<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- libgraphql-cli: Right-pointing chevron/arrowhead, 5 vertices, 5 edges -->
  <!-- Wider notch for legibility at small sizes -->
  <defs>
    <style>
      .edge { fill: none; stroke: #d4943c; stroke-width: 1.8; stroke-linejoin: round; stroke-linecap: round; }
      .vertex { fill: #d4943c; }
    </style>
  </defs>
  <!-- 5-point arrowhead with deep notch for readability -->
  <polygon class="edge" points="12,10 50,32 12,54 26,38 26,26"/>
  <!-- Vertex dots -->
  <circle class="vertex" cx="12" cy="10" r="2.3"/>
  <circle class="vertex" cx="50" cy="32" r="2.3"/>
  <circle class="vertex" cx="12" cy="54" r="2.3"/>
  <circle class="vertex" cx="26" cy="38" r="2.3"/>
  <circle class="vertex" cx="26" cy="26" r="2.3"/>
</svg>
